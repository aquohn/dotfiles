# use Ctrl-J; synonym for j/<CR> in Vim
set-option -g prefix C-j
bind C-j send-prefix
# start windows with index 0, for consistency
set -g base-index 0
set -g renumber-windows on

setw -g mode-keys vi
# fix escape key in vim
set-option -s escape-time 50

# make session kill faster
bind Q kill-session

# indicate when we have pressed prefix key
set-option -g status-left "#{?client_prefix,#[bg=colour3],} [#S]"

# copy to clipboard from copy mode
set -s set-clipboard off
bind -T copy-mode-vi Enter send -X copy-pipe "bash -c 'tee >(clip.exe) | tee >(xclip -i -selection c) | tee >(wl-copy) >/dev/null'"

# open new pane in current path
bind -N "Split windows vertically" '"' split-window -c "#{pane_current_path}"
bind -N "Split windows horizontally" % split-window -h -c "#{pane_current_path}"

bind -N "Next pane" -r o select-pane -t :.+
bind -N "Previous pane" -r C-o select-pane -t :.-
bind -N "Rotate panes clockwise" -r O rotate-window -D
bind -N "Rotate panes counterclockwise" -r M-o rotate-window -U

bind -N "Select the next window" -r n next-window
bind -N "Select the previous window" -r p previous-window

bind -N "Select the previously current window" C-^ last-window
bind -N "Select the pane above the active pane"           -r k select-pane -U
bind -N "Select the pane below the active pane"           -r j select-pane -D
bind -N "Select the pane to the left of the active pane"  -r h select-pane -L
bind -N "Select the pane to the right of the active pane" -r l select-pane -R
bind -N "Resize the pane up"                              -r C-k resize-pane -U
bind -N "Resize the pane down"                            -r C-j resize-pane -D
bind -N "Resize the pane left"                            -r C-h resize-pane -L
bind -N "Resize the pane right"                           -r C-l resize-pane -R
bind -N "Resize the pane up by 5"                         -r M-k resize-pane -U 5
bind -N "Resize the pane down by 5"                       -r M-j resize-pane -D 5
bind -N "Resize the pane left by 5"                       -r M-h resize-pane -L 5
bind -N "Resize the pane right by 5"                      -r M-l resize-pane -R 5


# Enable 256 colours
set -g default-terminal "screen-256color"
# set -ga terminal-overrides ',*:Tc' # this is for 256 color
# set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q' # this is for the cursor shape
set -s input-buffer-size 1048576 # maximum length of escape sequences, e.g. for sixels

# preserve core environment variables
set-option -ga update-environment " DISPLAY SSH_AUTH_SOCK MSYSTEM XDG_CURRENT_DESKTOP XDG_SESSION_TYPE DBUS_SESSION_BUS_ADDRESS "
# preserve wayland-related environment variables
set-option -ga update-environment " WAYLAND_DISPLAY SWAYSOCK I3SOCK "
# preserve MSYS-related environment variables
set-option -ga update-environment " MSYSTEM "

set -g focus-events on
setw -g monitor-bell on

set -g automatic-rename on
set -g automatic-rename-format '#{=/-15/...:pane_current_path}'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'sainnhe/tmux-fzf'

# tmux-window-name settings
set -g @tmux_window_name_log_level "'DEBUG'"

# tmux-resurrect settings
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'

# Install tmux plugin manager or update it
if-shell "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
     "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"
run "cd $TMUX_PLUGIN_MANAGER_PATH/tpm && git pull"

bind S run-shell -b "$TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/scripts/window.sh switch"
bind W run-shell -b "$TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/scripts/window.sh swap"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"

